name: Deploy to GitHub Pages

# The ACKO design system packages are served from an internal Nexus registry
# that GitHub's hosted runners cannot reach, so the app is built locally and the
# pre-built `dist/` folder is committed. This workflow just publishes that folder.

on:
  push:
    branches: [main]
    paths:
      - "dist/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
